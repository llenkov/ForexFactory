name: Fetch ForexFactory Calendar

on:
  schedule:
    # Всеки ден в 00:30 UTC (преди бота да публикува в 00:01... виж бележката долу)
    - cron: "30 0 * * 1"   # Всеки понеделник в 00:30 UTC
    - cron: "30 0 * * *"   # Всеки ден в 00:30 UTC (за !forex команда)
  workflow_dispatch:         # Позволява ръчно стартиране от GitHub UI

jobs:
  fetch-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Изтегли ForexFactory XML
        run: |
          curl -s \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Referer: https://www.forexfactory.com/" \
            --retry 3 \
            --retry-delay 5 \
            -o forex_calendar.xml \
            "https://nfs.faireconomy.media/ff_calendar_thisweek.xml"

          echo "--- Размер на файла ---"
          wc -c forex_calendar.xml

          echo "--- Първите 500 символа ---"
          head -c 500 forex_calendar.xml

      - name: Провери дали XML е валиден
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('forex_calendar.xml')
              root = tree.getroot()
              events = root.findall('event')
              print(f'✅ Валиден XML с {len(events)} събития')
          except Exception as e:
              print(f'❌ Невалиден XML: {e}')
              exit(1)
          "

      - name: Запази XML в репото
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add forex_calendar.xml
          git diff --cached --quiet && echo "Няма промени" || git commit -m "chore: update forex calendar $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
